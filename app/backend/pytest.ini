[pytest]
testpaths = test
python_files = test_*.py eval_*.py
python_classes = Test* Eval*
python_functions = test_* eval_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    unit: Unit tests for individual functions
    integration: Integration tests requiring FastAPI TestClient
    e2e: End-to-end tests (Playwright)
    dynamic: Dynamic tests validating LLM outputs against schemas
    evaluation: Evaluation suite for assessment quality metrics
    slow: Tests that take longer to run (e.g., real LLM calls)
    requires_llm: Tests that require a live LLM API key

pythonpath = ../..

addopts =
    --strict-markers
    -v
