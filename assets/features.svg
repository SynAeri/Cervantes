  <text x="235" y="57" text-anchor="middle" font-size="16">&#x1F9E0;</text>
  <text x="282" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">Socratic</text>
  <text x="282" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">Dialogue</text>
  <text x="272" y="85" font-size="8.5" fill="#6b655a">AI probes reasoning with</text>
  <text x="272" y="97" font-size="8.5" fill="#6b655a">targeted follow-up questions</text>

  <!-- Card 3 -->
  <rect x="380" y="20" width="165" height="130" rx="10" fill="#fff" filter="url(#fs)" stroke="#E8E2D6" stroke-width="1"/>
  <circle cx="415" cy="52" r="16" fill="#C4A245" opacity="0.12"/>
  <text x="415" y="57" text-anchor="middle" font-size="16">&#x1F3AF;</text>
  <text x="462" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">Curriculum</text>
  <text x="462" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">Aligned</text>
  <text x="452" y="85" font-size="8.5" fill="#6b655a">CurricuLLM grounds every</text>
  <text x="452" y="97" font-size="8.5" fill="#6b655a">question in official standards</text>

  <!-- Card 4 -->
  <rect x="560" y="20" width="165" height="130" rx="10" fill="#fff" filter="url(#fs)" stroke="#E8E2D6" stroke-width="1"/>
  <circle cx="595" cy="52" r="16" fill="#9E3B3B" opacity="0.12"/>
  <text x="595" y="57" text-anchor="middle" font-size="16">&#x1F50D;</text>
  <text x="642" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">Reasoning</text>
