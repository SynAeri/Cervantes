  <rect x="740" y="20" width="145" height="130" rx="10" fill="#fff" filter="url(#fs)" stroke="#E8E2D6" stroke-width="1"/>
  <circle cx="775" cy="52" r="16" fill="#3B827E" opacity="0.12"/>
  <text x="775" y="57" text-anchor="middle" font-size="16">&#x1F4F1;</text>
  <text x="812" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">PWA</text>
