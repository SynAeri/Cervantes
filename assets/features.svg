  <text x="92" y="85" font-size="8.5" fill="#6b655a">Visual novel scenes replace</text>
  <text x="92" y="97" font-size="8.5" fill="#6b655a">traditional exam formats</text>

  <!-- Card 2 -->
  <rect x="200" y="20" width="165" height="130" rx="10" fill="#fff" filter="url(#fs)" stroke="#E8E2D6" stroke-width="1"/>
