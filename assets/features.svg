<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 140" font-family="Segoe UI,system-ui,sans-serif">
  <rect width="880" height="140" rx="12" fill="#F4F1EA"/>

  <!-- Card 1: Narrative -->
  <rect x="18" y="16" width="160" height="108" rx="9" fill="#fff" stroke="#E8E2D6" stroke-width="1"/>
  <rect x="18" y="16" width="160" height="4" rx="2" fill="#C85A32"/>
  <text x="98" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#1E1C18">Narrative Assessment</text>
  <text x="98" y="66" text-anchor="middle" font-size="9" fill="#6b655a">Visual novel scenes replace</text>
  <text x="98" y="80" text-anchor="middle" font-size="9" fill="#6b655a">traditional exam formats</text>

  <!-- Card 2: Socratic -->
  <rect x="192" y="16" width="160" height="108" rx="9" fill="#fff" stroke="#E8E2D6" stroke-width="1"/>
  <rect x="192" y="16" width="160" height="4" rx="2" fill="#3B827E"/>
  <text x="272" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#1E1C18">Socratic Dialogue</text>
  <text x="272" y="66" text-anchor="middle" font-size="9" fill="#6b655a">AI probes reasoning with</text>
  <text x="272" y="80" text-anchor="middle" font-size="9" fill="#6b655a">targeted follow-up questions</text>

  <!-- Card 3: Curriculum -->
  <rect x="366" y="16" width="160" height="108" rx="9" fill="#fff" stroke="#E8E2D6" stroke-width="1"/>
  <rect x="366" y="16" width="160" height="4" rx="2" fill="#C4A245"/>
  <text x="446" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#1E1C18">Curriculum Aligned</text>
  <text x="446" y="66" text-anchor="middle" font-size="9" fill="#6b655a">CurricuLLM grounds every</text>
  <text x="446" y="80" text-anchor="middle" font-size="9" fill="#6b655a">question in official standards</text>

  <!-- Card 4: Reasoning -->
  <rect x="540" y="16" width="160" height="108" rx="9" fill="#fff" stroke="#E8E2D6" stroke-width="1"/>
  <rect x="540" y="16" width="160" height="4" rx="2" fill="#9E3B3B"/>
  <text x="620" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#1E1C18">Reasoning Traces</text>
  <text x="620" y="66" text-anchor="middle" font-size="9" fill="#6b655a">Captures full thought process</text>
  <text x="620" y="80" text-anchor="middle" font-size="9" fill="#6b655a">not just final answers</text>

  <!-- Card 5: PWA -->
  <rect x="714" y="16" width="148" height="108" rx="9" fill="#fff" stroke="#E8E2D6" stroke-width="1"/>
  <rect x="714" y="16" width="148" height="4" rx="2" fill="#3B827E"/>
  <text x="788" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#1E1C18">PWA Mobile</text>
  <text x="788" y="66" text-anchor="middle" font-size="9" fill="#6b655a">Works on any device,</text>
  <text x="788" y="80" text-anchor="middle" font-size="9" fill="#6b655a">no app install needed</text>
