<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="fs"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="900" height="170" rx="12" fill="#F4F1EA"/>

  <!-- Card 1 -->
  <rect x="20" y="20" width="165" height="130" rx="10" fill="#fff" filter="url(#fs)" stroke="#E8E2D6" stroke-width="1"/>
