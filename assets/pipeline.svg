<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C4A245"/><stop offset="100%" stop-color="#D4B86A"/></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C85A32"/><stop offset="100%" stop-color="#E07050"/></linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3B827E"/><stop offset="100%" stop-color="#4A9E9A"/></linearGradient>
    <linearGradient id="p4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1E1C18"/><stop offset="100%" stop-color="#2A2720"/></linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#C85A32"/></marker>
  </defs>

  <rect width="900" height="200" rx="12" fill="#F4F1EA"/>
  <text x="450" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1E1C18" letter-spacing="2.5">AI ASSESSMENT PIPELINE</text>
  <line x1="355" y1="35" x2="545" y2="35" stroke="#C85A32" stroke-width="2" stroke-linecap="round"/>

  <!-- Step 1: Upload -->
  <rect x="15" y="55" width="105" height="70" rx="8" fill="url(#p1)" filter="url(#ds)"/>
  <text x="67" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="#1E1C18" opacity="0.6">STEP 1</text>
  <text x="67" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">Upload</text>
  <text x="67" y="110" text-anchor="middle" font-size="8" fill="#1E1C18" opacity="0.7">Rubric PDF/DOCX</text>
  <line x1="120" y1="90" x2="138" y2="90" stroke="#C85A32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Parse -->
  <rect x="140" y="55" width="105" height="70" rx="8" fill="url(#p2)" filter="url(#ds)"/>
  <text x="192" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" opacity="0.7">STEP 2</text>
  <text x="192" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Parse</text>
  <text x="192" y="110" text-anchor="middle" font-size="8" fill="#fff" opacity="0.8">CurricuLLM</text>
  <line x1="245" y1="90" x2="263" y2="90" stroke="#C85A32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Plan -->
  <rect x="265" y="55" width="105" height="70" rx="8" fill="url(#p3)" filter="url(#ds)"/>
  <text x="317" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" opacity="0.7">STEP 3</text>
  <text x="317" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Plan Arc</text>
  <text x="317" y="110" text-anchor="middle" font-size="8" fill="#fff" opacity="0.8">Gemini</text>
  <line x1="370" y1="90" x2="388" y2="90" stroke="#C85A32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Generate -->
  <rect x="390" y="55" width="105" height="70" rx="8" fill="url(#p4)" filter="url(#ds)"/>
  <text x="442" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="#C85A32" opacity="0.8">STEP 4</text>
  <text x="442" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#F4F1EA">Generate</text>
  <text x="442" y="110" text-anchor="middle" font-size="8" fill="#F4F1EA" opacity="0.7">VN Scenes</text>
  <line x1="495" y1="90" x2="513" y2="90" stroke="#C85A32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Dialogue -->
  <rect x="515" y="55" width="105" height="70" rx="8" fill="url(#p2)" filter="url(#ds)"/>
  <text x="567" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" opacity="0.7">STEP 5</text>
  <text x="567" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Dialogue</text>
  <text x="567" y="110" text-anchor="middle" font-size="8" fill="#fff" opacity="0.8">Socratic AI</text>
  <line x1="620" y1="90" x2="638" y2="90" stroke="#C85A32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: Extract -->
  <rect x="640" y="55" width="105" height="70" rx="8" fill="url(#p3)" filter="url(#ds)"/>
  <text x="692" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" opacity="0.7">STEP 6</text>
  <text x="692" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Signals</text>
  <text x="692" y="110" text-anchor="middle" font-size="8" fill="#fff" opacity="0.8">3-Level Diagnosis</text>
  <line x1="745" y1="90" x2="763" y2="90" stroke="#C85A32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7: Analytics -->
  <rect x="765" y="55" width="120" height="70" rx="8" fill="url(#p1)" filter="url(#ds)"/>
  <text x="825" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="#1E1C18" opacity="0.6">STEP 7</text>
  <text x="825" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#1E1C18">Analytics</text>
  <text x="825" y="110" text-anchor="middle" font-size="8" fill="#1E1C18" opacity="0.7">Teacher Dashboard</text>

  <!-- Output labels -->
  <rect x="140" y="140" width="80" height="22" rx="4" fill="#C85A32" opacity="0.15"/>
  <text x="180" y="155" text-anchor="middle" font-size="8" font-weight="600" fill="#C85A32">Objectives</text>

  <rect x="265" y="140" width="80" height="22" rx="4" fill="#3B827E" opacity="0.15"/>
  <text x="305" y="155" text-anchor="middle" font-size="8" font-weight="600" fill="#3B827E">Scenes</text>

  <rect x="390" y="140" width="80" height="22" rx="4" fill="#1E1C18" opacity="0.1"/>
  <text x="430" y="155" text-anchor="middle" font-size="8" font-weight="600" fill="#1E1C18">VN Script</text>

  <rect x="515" y="140" width="80" height="22" rx="4" fill="#C85A32" opacity="0.15"/>
  <text x="555" y="155" text-anchor="middle" font-size="8" font-weight="600" fill="#C85A32">Traces</text>

  <rect x="640" y="140" width="105" height="22" rx="4" fill="#3B827E" opacity="0.15"/>
  <text x="692" y="155" text-anchor="middle" font-size="8" font-weight="600" fill="#3B827E">Mastery / Gap</text>

  <!-- Bottom note -->
  <text x="450" y="185" text-anchor="middle" font-size="9" fill="#6b655a">Rubric &rarr; Curriculum Alignment &rarr; Narrative Generation &rarr; Socratic Assessment &rarr; Reasoning Analytics</text>
</svg>
