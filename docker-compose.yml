services:
  db:
    image: postgres:16
    container_name: cervantes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cervantes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./app/backend
    container_name: cervantes-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cervantes
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./app/backend:/app
      - ./app/prompts:/app/prompts
      - ./assets:/app/assets

volumes:
  postgres_data:
